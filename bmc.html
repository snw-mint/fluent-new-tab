<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - Fluent New Tab</title>

    <link rel="stylesheet" href="../style.css">

    <script>
        (() => {
            try {
                const storedTheme = localStorage.getItem('theme-preference');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = storedTheme || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { }
        })();
    </script>

    <script>
        const destino = "https://buymeacoffee.com/snw.mint";
        setTimeout(() => {
            window.location.replace(destino);
        }, 1500);
    </script>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <img class="logo-mark" src="../android-chrome-512x512.png" alt="Fluent New Tab logo">
                <span>Fluent New Tab</span>
            </div>
            <div class="nav-links">
                <a href="../index.html">Return Home</a>
            </div>
        </div>
    </nav>

    <header class="hero" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container hero-content">

            <img src="../assets/emojis/hearts.png" alt="Support"
                style="display: block; margin: 0 auto 1.5rem; max-width: 5rem; height: auto;">

            <h1 class="title">Taking you to Buy Me a Coffee...</h1>
            <p class="subtitle">Thank you for supporting Fluent New Tab. If you are not redirected automatically, please
                click the button below.</p>

            <div class="hero-actions">
                <a href="https://buymeacoffee.com/snw.mint" class="btn-primary">Click here to continue</a>
                <a href="../index.html" class="btn-secondary">Cancel</a>
            </div>

        </div>
    </header>
</body>

</html>
