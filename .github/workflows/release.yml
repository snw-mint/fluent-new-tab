name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, edge, firefox]
        include:
          - browser: chrome
            launcher: 'google'
          - browser: edge
            launcher: 'microsoft'
          - browser: firefox
            launcher: 'proton'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Defaults for ${{ matrix.browser }}
        run: |
          # Mantemos apenas a injeção do App Launcher (Ecosystem)
          sed -i -E "s/launcherProvider:\s*'[a-zA-Z0-9_]+'/launcherProvider: '${{ matrix.launcher }}'/" scripts/background.js

      - name: Run release build
        run: npm run build:release

      - name: Prepare Firefox Manifest
        if: matrix.browser == 'firefox'
        run: |
          cp manifest-firefox.json dist/manifest.json

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package extension as zip
        run: |
          cd dist
          zip -r "../fluent-new-tab-v${{ steps.version.outputs.VERSION }}-${{ matrix.browser }}.zip" . \
            --exclude "*.map" \
            --exclude ".DS_Store"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fluent-new-tab-v${{ steps.version.outputs.VERSION }}-${{ matrix.browser }}.zip
          generate_release_notes: true
          draft: true
