name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, edge, firefox]
        include:
          - browser: chrome
            launcher: 'google'
            search: 'google'
          - browser: edge
            launcher: 'microsoft'
            search: 'bing'
          - browser: firefox
            launcher: 'proton'
            search: 'duck'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Defaults for ${{ matrix.browser }}
        run: |
          sed -i -E "s/launcherProvider:\s*'[a-zA-Z0-9_]+'/launcherProvider: '${{ matrix.launcher }}'/" scripts/background.js
          sed -i -E "s/searchEngine:\s*'[a-zA-Z0-9_]+'/searchEngine: '${{ matrix.search }}'/" scripts/background.js

      - name: Run release build
        run: npm run build:release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package extension as zip
        run: |
          cd dist
          zip -r "../fluent-new-tab-v${{ steps.version.outputs.VERSION }}-${{ matrix.browser }}.zip" . \
            --exclude "*.map" \
            --exclude ".DS_Store"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fluent-new-tab-v${{ steps.version.outputs.VERSION }}-${{ matrix.browser }}.zip
          generate_release_notes: true
          draft: true

  update-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: leading

      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - run: |
          cd source
          npm ci
          npm run build:release

      - run: |
          cd source/dist
          jq 'del(.locales, .permissions)' manifest.json > temp.json
          mv temp.json manifest.json

      - run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const localePath = '_locales\en\messages.json';

          if (!fs.existsSync(localePath)) process.exit(0);

          const messages = JSON.parse(fs.readFileSync(localePath, 'utf8'));

          function replaceInFile(filePath) {
            let content = fs.readFileSync(filePath, 'utf8');
            content = content.replace(/__MSG_(\w+)__/g, (match, key) => messages[key] ? messages[key].message : match);
            fs.writeFileSync(filePath, content);
          }

          function processDirectory(dir) {
            fs.readdirSync(dir).forEach(file => {
              const fullPath = path.join(dir, file);
              if (fs.statSync(fullPath).isDirectory()) {
                processDirectory(fullPath);
              } else if (fullPath.endsWith('.html') || fullPath.endsWith('.js')) {
                replaceInFile(fullPath);
              }
            });
          }

          processDirectory('demo');
          "

      - run: |
          rm -rf demo/*
          cp -r source/dist/* demo/
          rm -rf source

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo/
          git commit -m "chore: sync demo files" || true
          git push origin leading
