name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release build (Chrome)
        run: npm run build
        env:
          VITE_STORE: chrome
          VITE_STORE_RATE_URL: 'https://chromewebstore.google.com/detail/fluent-new-tab/pbbiecccbghiolgifmlichmgpoclijfa/reviews?hl=en-US#:~:text=write%20a%20review'

      - name: Package Chrome extension
        run: |
          cd dist
          zip -r "../fluent-new-tab-v${{ steps.version.outputs.VERSION }}-chrome.zip" . \
            --exclude "*.map" \
            --exclude ".DS_Store"

      - name: Run release build (Edge)
        run: npm run build
        env:
          VITE_STORE: edge
          VITE_STORE_RATE_URL: 'https://microsoftedge.microsoft.com/addons/detail/fluent-new-tab/hcohjkajcimobdddlnfnfhdfnbapondc#:~:text=add%20a%20review'

      - name: Package Edge extension
        run: |
          cd dist
          zip -r "../fluent-new-tab-v${{ steps.version.outputs.VERSION }}-edge.zip" . \
            --exclude "*.map" \
            --exclude ".DS_Store"

      - name: Run release build (Firefox)
        run: |
          mv manifest.json manifest-chrome.json
          cp manifest-firefox.json manifest.json
          npm run build
          mv manifest-chrome.json manifest.json
        env:
          VITE_STORE: firefox
          VITE_STORE_RATE_URL: 'https://addons.mozilla.org/en-US/firefox/addon/fluent-new-tab/#:~:text=rated'

      - name: Package Firefox extension
        run: |
          cd dist
          zip -r "../fluent-new-tab-v${{ steps.version.outputs.VERSION }}-firefox.zip" . \
            --exclude "*.map" \
            --exclude ".DS_Store"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fluent-new-tab-v${{ steps.version.outputs.VERSION }}-chrome.zip
            fluent-new-tab-v${{ steps.version.outputs.VERSION }}-edge.zip
            fluent-new-tab-v${{ steps.version.outputs.VERSION }}-firefox.zip
          generate_release_notes: true
          draft: true
