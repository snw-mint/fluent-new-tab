name: Deploy Live Demo

on:
  push:
    branches:
      - test-workflow
      - leading
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}demo/index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build:release

      - name: Inject API Mock into Script
        run: |
          cat << 'EOF' > patch.js
          const fs = require('fs');
          const path = require('path');

          const localePath = path.join('dist', '_locales', 'en_US', 'messages.json');
          const fallbackPath = path.join('dist', '_locales', 'en', 'messages.json');
          const targetScript = path.join('dist', 'script.js');

          let messages = {};
          if (fs.existsSync(localePath)) {
            messages = fs.readFileSync(localePath, 'utf8');
          } else if (fs.existsSync(fallbackPath)) {
            messages = fs.readFileSync(fallbackPath, 'utf8');
          }

          const mock = `
            window.chrome = window.chrome || {};
            window.chrome.runtime = { 
              getURL: path => path.startsWith('/') ? path.slice(1) : path 
            };
            window.chrome.storage = {
              local: {
                get: (keys, cb) => {
                  let res = {};
                  [].concat(keys).forEach(k => {
                    let v = localStorage.getItem('fnt_mock_' + k);
                    if (v) res[k] = JSON.parse(v);
                  });
                  if (cb) cb(res);
                },
                set: (items, cb) => {
                  Object.entries(items).forEach(([k, v]) => {
                    localStorage.setItem('fnt_mock_' + k, JSON.stringify(v));
                  });
                  if (cb) cb();
                }
              }
            };
            const PRELOADED_LOCALE = ${messages || '{}'};
            window.chrome.i18n = {
              getMessage: (key, subs) => {
                let text = PRELOADED_LOCALE[key]?.message || '';
                if (subs) {
                  [].concat(subs).forEach((val, index) => {
                    text = text.replace(new RegExp('\\\\$' + (index + 1), 'g'), val);
                  });
                }
                return text;
              }
            };
            setTimeout(() => document.dispatchEvent(new Event('i18nReady')), 50);
          `;

          const originalCode = fs.readFileSync(targetScript, 'utf8');
          fs.writeFileSync(targetScript, mock + '\n' + originalCode);
          EOF
          node patch.js

      - name: Format Artifact Structure
        run: |
          mkdir -p public/demo
          mv dist/* public/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
