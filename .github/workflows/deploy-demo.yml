name: Deploy Pages with Separate Branches

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout site (leading)
        uses: actions/checkout@v4
        with:
          ref: leading
          path: site-root

      - name: Checkout extension (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: extension

      - name: Install and Build Demo
        working-directory: ./extension
        run: |
          npm install
          npm run build

      - name: Prepare publish directory
        run: |
          mkdir -p publish/demo
          cp -r site-root/* publish/
          cp -r extension/dist/* publish/demo/

      - name: Create Initializer and API Mock
        run: |
          cat << 'EOF' > patch.js
          const fs = require('fs');
          const path = require('path');
          const demo = path.join('publish', 'demo');
          const localePath = path.join(demo, '_locales', 'en_US', 'messages.json');
          const fallbackPath = path.join(demo, '_locales', 'en', 'messages.json');

          let messages = '{}';
          if (fs.existsSync(localePath)) {
            messages = fs.readFileSync(localePath, 'utf8');
          } else if (fs.existsSync(fallbackPath)) {
            messages = fs.readFileSync(fallbackPath, 'utf8');
          }

          const PRESETS = {
            shortcuts: '[{"name":"Wikipedia","url":"https://wikipedia.com","customIcon":"https://upload.wikimedia.org/wikipedia/en/8/80/Wikipedia-logo-v2.svg"},{"name":"YouTube","url":"https://youtube.com","customIcon":null},{"name":"Github","url":"https://github.com/snw-mint/fluent-new-tab","customIcon":"https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg"},{"name":"BMC","url":"https://buymeacoffee.com/snw.mint"},{"name":"Help","url":"https://snw-mint.github.io/fluent-new-tab/help","customIcon":"https://github.com/snw-mint/fluent-new-tab/blob/leading/android-chrome-512x512.png?raw=true","type":"link"},{"name":"Spotify","url":"https://spotify.com","customIcon":null},{"name":"Crowdin","url":"https://crowdin.com/project/fluent-new-tab","customIcon":"https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/crowdin.svg"}]',
            theme: 'auto',
            shortcutsVisible: 'true',
            shortcutsRows: '1',
            launcherEnabled: 'true',
            launcherProvider: 'microsoft',
            showGreeting: 'true',
            greetingName: '',
            greetingType: 'none',
            userLanguage: 'en_US',
            searchEngine: 'system',
            searchBarVisible: 'true',
            compactBarEnabled: 'false',
            accentColorEnabled: 'true',
            accentColorMode: 'manual',
            accentColorValue: '#107C41',
            displayType: 'greeting',
            showSeconds: 'false',
            use12Hour: 'false',
            dateFormat: 'numeric',
            askAiEnabled: 'false'
          };

          const mockJS = `
            if (!localStorage.getItem('fnt_demo_seeded')) {
              const presets = ${JSON.stringify(PRESETS)};
              for (const [key, value] of Object.entries(presets)) {
                localStorage.setItem(key, value);
              }
              localStorage.setItem('fnt_demo_seeded', 'true');
            }
            window.chrome = window.chrome || {};
            window.chrome.runtime = { 
              id: "fnt-live-demo",
              getURL: path => path.startsWith('/') ? path.slice(1) : path,
              getManifest: () => ({ version: "3.6.2 Demo" }),
              lastError: null,
              onMessage: { addListener: () => {} },
              sendMessage: (msg, cb) => { if(cb) cb({}); }
            };
            window.chrome.permissions = {
              contains: (p, cb) => { if(cb) cb(true); return Promise.resolve(true); },
              request: (p, cb) => { if(cb) cb(true); return Promise.resolve(true); }
            };
            window.chrome.storage = {
              local: {
                get: (keys, cb) => {
                  let res = {};
                  let arr = Array.isArray(keys) ? keys : (typeof keys === 'string' ? [keys] : Object.keys(keys));
                  arr.forEach(k => {
                    let v = localStorage.getItem('fnt_local_' + k);
                    res[k] = v ? JSON.parse(v) : (keys[k] !== undefined ? keys[k] : null);
                  });
                  if (cb) cb(res);
                },
                set: (items, cb) => {
                  Object.entries(items).forEach(([k, v]) => {
                    localStorage.setItem('fnt_local_' + k, JSON.stringify(v));
                  });
                  if (cb) cb();
                },
                remove: (keys, cb) => {
                  let arr = Array.isArray(keys) ? keys : [keys];
                  arr.forEach(k => localStorage.removeItem('fnt_local_' + k));
                  if (cb) cb();
                }
              }
            };
            
            const PRELOADED_LOCALE = ${messages || '{}'};
            window.chrome.i18n = {
              getMessage: (key, subs) => {
                let text = PRELOADED_LOCALE[key]?.message || '';
                if (subs) {
                  [].concat(subs).forEach((val, index) => {
                    text = text.replace(new RegExp('\\\\$' + (index + 1), 'g'), val);
                  });
                }
                return text;
              },
              getUILanguage: () => 'en-US'
            };
            setTimeout(() => document.dispatchEvent(new Event('i18nReady')), 50);
          `;
          fs.writeFileSync(path.join(demo, 'mock-env.js'), mockJS);

          const indexHtmlPath = path.join(demo, 'index.html');
          let htmlContent = fs.readFileSync(indexHtmlPath, 'utf8');
          htmlContent = htmlContent.replace(/<head[^>]*>/i, match => match + '\n    <script src="mock-env.js"></script>');
          fs.writeFileSync(indexHtmlPath, htmlContent);
          EOF
          node patch.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './publish'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
